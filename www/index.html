<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Flipp Bird 🐦</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
  *{margin:0;padding:0;box-sizing:border-box;}
  body{
    background:#1a0533;
    display:flex;justify-content:center;align-items:center;
    height:100vh;overflow:hidden;
    font-family:'Press Start 2P',monospace;
    touch-action:none;
  }
  #gw{position:relative;width:360px;height:640px;}
  canvas{
    display:block;width:360px;height:640px;
    border-radius:16px;
    box-shadow:0 0 60px #a855f7aa,0 0 120px #7c3aed55;
    border:2px solid #a855f7;
  }
  #ui{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;}
  #score{
    position:absolute;top:20px;left:50%;transform:translateX(-50%);
    color:#fff;font-size:26px;display:none;
    text-shadow:0 0 10px #a855f7,2px 2px 0 #000;
  }
  #coinHud{
    position:absolute;top:20px;left:14px;
    color:#fde68a;font-size:10px;
    text-shadow:0 0 8px #f59e0b,1px 1px 0 #000;
  }
  #musicBtn{
    position:absolute;top:14px;right:14px;
    background:rgba(168,85,247,0.25);border:1.5px solid #a855f7;
    border-radius:8px;color:#f0abfc;
    font-family:'Press Start 2P',monospace;font-size:9px;
    padding:5px 8px;cursor:pointer;pointer-events:all;z-index:30;
  }
  .ovl{
    position:absolute;top:0;left:0;width:100%;height:100%;
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    background:rgba(10,0,25,0.92);border-radius:16px;
    pointer-events:all;z-index:20;
  }
  .ovl.h{display:none !important;}
  .bird-em{font-size:64px;animation:bnc .7s infinite alternate;filter:drop-shadow(0 0 16px #a855f7);}
  @keyframes bnc{from{transform:translateY(0) rotate(-10deg);}to{transform:translateY(-16px) rotate(10deg);}}
  .ttl{margin-top:14px;color:#f0abfc;font-size:24px;text-shadow:0 0 16px #a855f7,2px 2px 0 #000;letter-spacing:2px;}
  .sub{margin-top:6px;color:#c084fc;font-size:8px;letter-spacing:1px;}
  .btn{
    padding:16px 0;width:220px;
    background:linear-gradient(135deg,#7c3aed,#a855f7);
    border:2px solid #f0abfc;border-radius:12px;
    color:#fff;font-family:'Press Start 2P',monospace;font-size:13px;
    cursor:pointer;box-shadow:0 0 24px #a855f755;
    transition:transform .1s;pointer-events:all;
    text-align:center;display:block;user-select:none;
  }
  .btn:active{transform:scale(.96);}
  .brow{display:flex;flex-direction:column;gap:12px;margin-top:22px;align-items:center;}
  .btn-shop{background:linear-gradient(135deg,#0e7490,#0891b2);border-color:#67e8f9;}
  #bestSc{margin-top:14px;color:#e879f9;font-size:8px;}
  #deathSc{color:#f9a8d4;font-size:15px;margin-top:10px;}
  .hint{margin-top:12px;color:#d8b4fe;font-size:7px;animation:blk 1s infinite;}
  @keyframes blk{0%,100%{opacity:1}50%{opacity:.2}}

  /* Countdown & Shop Styles qisqartirildi (Sizda borlari qoladi) */
  #cdOvl{z-index:25;background:rgba(10,0,25,0.75);}
  #cdNum{font-size:110px;color:#f0abfc;text-shadow:0 0 40px #a855f7,4px 4px 0 #000;}
  #revOvl{z-index:22;}
  #shopOvl{z-index:22;justify-content:flex-start;padding:20px 0 12px;overflow-y:auto;}
  .sgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;padding:0 12px;width:100%;}
  .scard{background:rgba(168,85,247,.12);border:2px solid #7c3aed;border-radius:12px;padding:10px 4px 8px;text-align:center;cursor:pointer;}
</style>
</head>
<body>
<div id="gw">
  <canvas id="c" width="360" height="640"></canvas>
  <div id="ui">
    <div id="coinHud">🪙 <span id="cc">0</span></div>
    <div id="score">0</div>
    <button id="musicBtn" onclick="togMusic()">🎵 ON</button>
  </div>

  <div class="ovl" id="mOvl">
    <div class="bird-em">🐦</div>
    <div class="ttl">FLIPP BIRD</div>
    <div id="deathSc" style="display:none"></div>
    <div class="brow">
      <button class="btn" id="startBtn" onclick="startGame()">▶ PLAY</button>
      <button class="btn btn-shop" onclick="openShop()">🛒 SKINS</button>
    </div>
    <div id="bestSc">🏆 BEST: 0</div>
    <div style="margin-top:8px;color:#fde68a;font-size:8px;">🪙 <span id="mcc">0</span> coins</div>
  </div>

  <div class="ovl h" id="shopOvl">
    <div class="sgrid" id="sgrid"></div>
    <button class="btn" style="margin-top:10px" onclick="closeShop()">BACK</button>
  </div>
  
  <div class="ovl h" id="revOvl">
    <div style="color:white; margin-bottom:20px;">REVIVE?</div>
    <button class="btn" onclick="doRevive()">YES (30🪙)</button>
    <button class="btn" style="background:gray; margin-top:10px" onclick="skipRevive()">NO</button>
  </div>
</div>

<script src="cordova.js"></script>
<script>
// --- ADMOB IDLARI ---
const BANNER_ID = 'ca-app-pub-8551993495127896/5000749696';
const INTER_ID = 'ca-app-pub-8551993495127896/1117345007';

document.addEventListener('deviceready', () => {
  if (typeof admob !== 'undefined') {
    admob.banner.prepare({ id: BANNER_ID, autoShow: true });
    admob.interstitial.prepare({ id: INTER_ID, autoShow: false });
  }
}, false);

function showFullAd() {
  if (typeof admob !== 'undefined') {
    admob.interstitial.show();
    admob.interstitial.prepare({ id: INTER_ID, autoShow: false });
  }
}

// --- O'YIN LOGIKASI ---
const cv=document.getElementById('c'),ctx=cv.getContext('2d');
const W=360,H=640;
const SKINS=[
  {id:'classic',nm:'Classic',p:0,  c:['#fde68a','#f59e0b','#b45309'],bk:'#f97316',ey:'#1e1b4b',gl:'#f0abfc'},
  {id:'fire',   nm:'Fire',   p:50, c:['#fca5a5','#ef4444','#991b1b'],bk:'#f97316',ey:'#1e1b4b',gl:'#f97316'},
  {id:'ice',    nm:'Ice',    p:50, c:['#bae6fd','#38bdf8','#0369a1'],bk:'#e0f2fe',ey:'#1e1b4b',gl:'#38bdf8'}
];

let coins=0, owned=['classic'], activeSkin='classic', bestScore=0;
let state='menu', score=0, frames=0;
let by=H/2, bvy=0, pipes=[], coinItems=[];
const BX=80, BR=18, GRV=.38, JMP=-7.5, PIPEW=52;

function drawBirdAt(c2d, cx, cy, r, sk) {
  c2d.save();
  c2d.shadowBlur = r; c2d.shadowColor = sk.gl;
  c2d.beginPath(); c2d.arc(cx, cy, r, 0, Math.PI*2);
  c2d.fillStyle = sk.c[1]; c2d.fill();
  c2d.restore();
}

function startGame(){
  state='playing'; score=0; pipes=[]; by=H/2; bvy=0;
  document.getElementById('mOvl').classList.add('h');
  document.getElementById('score').style.display='block';
}

function jump(){ if(state==='playing') bvy=JMP; }

function die() {
  if(state!=='playing') return;
  state='dead';
  showFullAd(); // O'yin tugashi bilan reklama
  if(score > bestScore) bestScore = score;
  
  setTimeout(() => {
    state='menu';
    document.getElementById('mOvl').classList.remove('h');
    document.getElementById('deathSc').style.display='block';
    document.getElementById('deathSc').textContent='SCORE: '+score;
    document.getElementById('bestSc').textContent='🏆 BEST: '+bestScore;
  }, 500);
}

function update(){
  if(state!=='playing') return;
  bvy+=GRV; by+=bvy;
  if(by+BR>H-60 || by-BR<0) die();
  
  if(frames % 100 === 0) {
      pipes.push({x:W, top: Math.random()*300+100});
  }
  
  pipes.forEach(p => {
      p.x -= 3;
      if(BX+BR > p.x && BX-BR < p.x + PIPEW) {
          if(by-BR < p.top || by+BR > p.top + 150) die();
      }
      if(p.x === BX) { score++; document.getElementById('score').textContent=score; }
  });
  pipes = pipes.filter(p => p.x > -PIPEW);
}

function frame(){
  ctx.fillStyle='#1e0352'; ctx.fillRect(0,0,W,H);
  if(state==='playing' || state==='menu') {
      const sk = SKINS.find(s=>s.id===activeSkin);
      drawBirdAt(ctx, BX, by, BR, sk);
      update();
      // Quvurlarni chizish
      ctx.fillStyle='#a855f7';
      pipes.forEach(p => {
          ctx.fillRect(p.x, 0, PIPEW, p.top);
          ctx.fillRect(p.x, p.top+150, PIPEW, H);
      });
  }
  frames++;
  requestAnimationFrame(frame);
}

cv.addEventListener('pointerdown', e => {
  e.preventDefault();
  if(state==='menu') startGame();
  else jump();
});

function openShop() { document.getElementById('shopOvl').classList.remove('h'); }
function closeShop() { document.getElementById('shopOvl').classList.add('h'); }

requestAnimationFrame(frame);
</script>
</body>
</html>
