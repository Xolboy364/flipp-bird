name: Build APK and AAB (Dual Release)

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Dependencies
        run: |
          npm install
          npm install -g @capacitor/cli @capacitor/core @capacitor/android

      - name: Initialize Android Project
        run: |
          rm -rf android
          npx cap add android || true
          npx cap sync android

      - name: Build Android Release
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleRelease  # Mana shu buyruq APK yaratadi
          ./gradlew bundleRelease    # Bu esa AAB yaratadi

      - name: Sign Android Files
        id: sign_app
        uses: r0adkll/sign-android-release@v1
        with:
          releaseDirectory: android/app/build/outputs/apk/release
          signingKeyBase64: ${{ secrets.KEYSTORE_BASE64 }}
          alias: ${{ secrets.KEY_ALIAS }}
          keyStorePassword: ${{ secrets.KEYSTORE_PASSWORD }}
          keyPassword: ${{ secrets.KEY_PASSWORD }}

      - name: Upload APK (Telefoningizga o'rnatish uchun)
        uses: actions/upload-artifact@v4
        with:
          name: flipp-bird-INSTALL-APK
          path: android/app/build/outputs/apk/release/app-release-unsigned-signed.apk
